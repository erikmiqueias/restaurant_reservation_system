services:
  db:
    image: postgres:15.3-alpine
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: reservations_db
    volumes:
      - ./.pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: restaurant-reservation-system
    restart: always
    env_file:
      - .env
    ports:
      - 3333:3333
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/reservations_db?schema=public
      - PORT=3333

volumes:
  pgdata:
